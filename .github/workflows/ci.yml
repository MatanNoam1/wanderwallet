name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # CI-only dummy values so build/typecheck don't read real secrets.
      DATABASE_URL: "file:./ci.db"
      AUTH_SECRET: "ci-dummy-secret-not-used-at-runtime"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run build
